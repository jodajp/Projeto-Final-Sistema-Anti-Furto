version: '3.8'

services:
  api_backend:
    image: api_backend_local:latest  # <--- APENAS TESTE LOCAL
    build: 
      context: ./Backend  
    ports:
      - "8000:8000"            
    networks:
      - rede_cluster              
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure    

  dashboard_frontend:
    image: dashboard_local:latest    
    build: 
      context: ./dashboard-antifurto 
    ports:
      - "8080:80"                
    networks:
      - rede_cluster

  base_dados:
    image: postgres:15-alpine     
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: antifurto_db
    ports:
      - "5432:5432"
    networks:
      - rede_cluster
    volumes:
      - dados_postgres:/var/lib/postgresql/data 

networks:
  rede_cluster:
    driver: overlay   
    attachable: true 

volumes:
  dados_postgres:


