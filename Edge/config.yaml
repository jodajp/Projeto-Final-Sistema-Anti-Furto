# =========================================
# CONFIGURAÇÃO DO SISTEMA ANTI-FURTO
# =========================================

camera:
  id: 0
  width: 640
  height: 480
  fps: 30
  #backend: CAP_DSHOW
  backend: CAP_ANY

runtime:
  frame_skip: 2
  cache_result: true
  debug: false
  api_url: "http://projeto-antifurto-vm1.norwayeast.cloudapp.azure.com:8000"  # Endereço da API na Cloud

detector:
  type: onnx
  mmpose:
    model_name: rtmpose-m_8xb256-420e_coco-256x192
    device: cpu
  onnx:
    model_path: https://download.openmmlab.com/mmpose/v1/projects/rtmo/onnx_sdk/rtmo-l_16xb16-600e_body7-640x640-b37118ce_20231211.zip
    use_gpu: true

activities:
  - enabled: false
    plugin: Atividades_Suspeitas.shoplifting_detector:ShopliftingActivityDetector
    params:
      model_path: ./models/activity_classifier.pth
      seq_length: 45
      threshold: 0.50
      cooldown_frames: 45
  - enabled: false
    plugin: Atividades_Suspeitas.velocity_detector:VelocityDetector
    params:
      velocidade_maxima: 200.0

  - enabled: false
    plugin: Atividades_Suspeitas.posture_detector:PostureDetector
    params:
      agachamento_threshold: 0.6
      tempo_minimo: 5

  - enabled: false
    plugin: Atividades_Suspeitas.hand_proximity_detector:HandProximityDetector
    params:
      distancia_maxima: 150.0  
      tempo_minimo: 10

alerts:
  handlers:
    - enabled: true
      plugin: Alertas.alert_system:AlertSystem
      params:
        pasta_alertas: ./Alertas/history/
        save_json: true
        verbose: true

visualization:
  enabled: true
  show_skeleton_canvas: true
  confidence_threshold: 0.3
  window_name: ANTI-FURTO
  colors:
    line: [0, 255, 255]
    point: [0, 255, 0]
    canvas_line: [0, 0, 255]
    canvas_point: [0, 200, 0]
    text: [0, 255, 0]
    warning: [0, 0, 255]
    muted: [200, 200, 200]

tracker:
  track_thresh: 0.35
  track_buffer: 90
  match_thresh: 0.7

temporal_filtering:
  enabled: true
  # Core smoothing parameters
  smoothing_factor: 0.6                      # EMA factor for slow/normal movements
  smoothing_factor_fast: 0.85                # EMA factor for rapid movements (shoplifting grabs)
  rapid_movement_threshold: 5.0              # px/frame threshold to trigger fast mode
  velocity_smoothing: 0.3                    # EMA factor for velocity smoothing
  occlusion_confidence_threshold: 0.3        # Threshold below which keypoint is occluded
  max_occlusion_frames: 5                    # Max frames to predict during occlusion
  velocity_damping: 0.94                     # Velocity decay during occlusion (0.94 = 6% loss/frame)
  
  # Skeletal constraint parameters
  limb_stretch_threshold: 1.5                # Max allowed limb length ratio vs baseline (1.5 = 50% stretch)
  # Feature toggles
  enable_hierarchical_confidence: true       # If parent occluded, reduce children
  
  # Head & arm motion handling (NEW - user-requested fixes)
  disable_head_prediction: true              # Don't predict eyes/nose when out of frame (drop instead)

spatial_normalization:
  enabled: true
  torso_confidence_threshold: 0.5
  min_torso_length_px: 10.0
  allow_invalid_torso: false
  visualization:
    debug_mode: true
    canvas_size: 500
    show_labels: true
  bbox_padding:
    x: 25
    y: 35
  default_class_id: 0.0

# Phase 4: sequence classification (shoplifting vs normal)
phase4:
  sequence_length: 30
  input_size: 34
  hidden_size: 128
  num_layers: 1
  attention_size: 64
  dropout: 0.1
  learning_rate: 0.001
  batch_size: 16
  epochs: 30
  weight_decay: 0.0
  confidence_weighted_loss: true
  device: null
